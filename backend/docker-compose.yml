services:
  db:
    image: postgres:17
    container_name: db-auth-app-lab
    env_file: 
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: .
    container_name: be-auth-app-lab
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
    - ./src:/app/src   # ← ya está bien
    command: >
      uv run uvicorn app.main:app
      --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: